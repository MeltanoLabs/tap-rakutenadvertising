send_anonymous_usage_stats: true
project_id: "tap-rakutenadvertising"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-rakutenadvertising"
    namespace: "tap_rakutenadvertising"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: auth_token
      kind: password
      label: Auth Token
      description: Bearer token for the Rakuten Advertising API. Generate one at https://developers.rakutenadvertising.com.
      sensitive: true

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: >
        Earliest date to sync incremental streams (events, publisher_contributed_conversions).
        ISO 8601 format, e.g. 2024-01-01T00:00:00Z. Defaults to 6 months ago.

    - name: api_url
      kind: string
      label: API URL
      description: Base URL for the Rakuten Advertising API.
      value: https://api.linksynergy.com

    - name: offer_status
      kind: string
      label: Offer Status
      description: Filter for the offers stream. One of active, available, upcoming.
      value: active

    - name: product_search_keyword
      kind: string
      label: Product Search Keyword
      description: Search keyword for the product_search stream.

    - name: product_search_mid
      kind: integer
      label: Product Search MID
      description: Advertiser ID filter for the product_search stream.

    - name: link_locator_advertiser_id
      kind: integer
      label: Link Locator Advertiser ID
      description: Advertiser ID for Link Locator streams (-1 = all).
      value: -1

    - name: link_locator_category_id
      kind: integer
      label: Link Locator Category ID
      description: Category ID for Link Locator streams (-1 = all).
      value: -1

    - name: banner_size_code
      kind: integer
      label: Banner Size Code
      description: Banner size code for the banner_links stream (-1 = all).
      value: -1

    - name: security_token
      kind: password
      label: Security Token
      description: >
        Security token for the Advanced Reports API. This is NOT the Bearer token.
        Obtain from Rakuten publisher dashboard. Required for advanced_reports_* streams.
      sensitive: true

    - name: advanced_reports_pay_id
      kind: integer
      label: Advanced Reports Payment ID
      description: >
        Payment ID for Advanced Reports advertiser payments streams (reportid 2/22).
        Retrieve from the payment history summary report.

    - name: advanced_reports_invoice_id
      kind: integer
      label: Advanced Reports Invoice ID
      description: >
        Invoice ID for Advanced Reports payment details streams (reportid 3/23).
        Retrieve from the advertiser payments report.

    - name: advanced_reports_network_id
      kind: integer
      label: Advanced Reports Network ID
      description: Optional network ID filter for Advanced Reports (1, 3, 5, 41).

    - name: reporting_api_token
      kind: password
      label: Reporting Platform API Token
      description: >
        API token for the Rakuten Reporting Platform (ran-reporting.rakutenmarketing.com).
        Found in the report URL under the 'token=' parameter.
        Required for reporting_* streams.
      sensitive: true

    - name: reporting_report_keys
      kind: string
      label: Reporting Platform Report Keys
      description: >
        Comma-separated report keys for the Reporting Platform
        (e.g. 'data_team_monthly_report_us,sales-and-activity-report').
        Each key becomes a separate stream.

    - name: reporting_region
      kind: string
      label: Reporting Platform Region
      description: Region code for the Reporting Platform API (default en).
      value: en

    - name: reporting_date_type
      kind: string
      label: Reporting Platform Date Type
      description: Date type for Reporting Platform reports. One of transaction, process.
      value: transaction

    settings_group_validation:
    - [auth_token]
    # Advanced Reports streams require security_token
    - [auth_token, security_token]
    # Reporting Platform streams require both token and report keys
    - [auth_token, reporting_api_token, reporting_report_keys]

    config:
      start_date: 6 months ago

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
